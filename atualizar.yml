name: Atualizar Dashboard de Engajamento

on:
  push:
    paths:
      - "consumo.csv"
      - "consumo_cursa.csv"
      - "clientes.csv"
      - "usuarios.csv"
      - "nao_iniciou.csv"
      - "gerar_dashboard.py"
  workflow_dispatch: {}   # permite rodar manualmente pela aba "Actions"

# Garante que uploads em sequência não causem corrida de push:
# mantém apenas a execução mais recente.
concurrency:
  group: dashboard-engajamento
  cancel-in-progress: true

jobs:
  gerar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar dashboard
        run: python3 gerar_dashboard.py

      - name: Publicar index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Sem mudancas no index.html - nada a publicar."
            exit 0
          fi
          git commit -m "Dashboard atualizado - $(date '+%d/%m/%Y %H:%M')"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}" \
              && { echo "Publicado com sucesso."; exit 0; }
            echo "Push falhou (tentativa $i/3). Atualizando e tentando de novo..."
            sleep 5
          done
          echo "ERRO: falha ao publicar apos 3 tentativas." >&2
          exit 1
